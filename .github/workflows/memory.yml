name: Auto Vectorize
on:
  push:
    paths:
      - 'chat_history.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install @huggingface/inference
      - run: node vectorize.mjs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - name: Push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f vectors.json ]; then
            git add vectors.json
            git commit -m "update vectors" || exit 0
            git push
          fi
